hydra:
  run:
    dir: ./outputs/data_cvt_hydra_save/singlerun/${now:%Y%m%d_%H%M%S}
  sweep:
    dir: ./outputs/data_cvt_hydra_save/multirun/${now:%Y%m%d_%H%M%S}
    subdir: ${hydra:job.override_dirname}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - rosbag.rosbag_dir=/home/zhangyutao/Documents/Work/Code/Contest/test_bags/inputs/02
    - rosbag.lerobot_dir=/home/zhangyutao/Documents/Work/Code/Contest/test_bags/outputs/export/lerobot
    - rosbag.metadata_json=/home/zhangyutao/Documents/Work/Code/Contest/test_bags/inputs/02/metadata.json
  job:
    name: CvtRosbag2Lerobot
    chdir: null
    override_dirname: rosbag.lerobot_dir=/home/zhangyutao/Documents/Work/Code/Contest/test_bags/outputs/export/lerobot,rosbag.metadata_json=/home/zhangyutao/Documents/Work/Code/Contest/test_bags/inputs/02/metadata.json,rosbag.rosbag_dir=/home/zhangyutao/Documents/Work/Code/Contest/test_bags/inputs/02
    id: ???
    num: ???
    config_name: KuavoRosbag2Lerobot_claw.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.2'
    cwd: /home/zhangyutao/Documents/Work/Code/Contest/aliyun-data-toolbox/rosbag2lerobotv3/kuavo_data
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/zhangyutao/Documents/Work/Code/Contest/aliyun-data-toolbox/rosbag2lerobotv3/kuavo_data/configs
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/zhangyutao/Documents/Work/Code/Contest/aliyun-data-toolbox/rosbag2lerobotv3/kuavo_data/outputs/data_cvt_hydra_save/singlerun/20260304_175852
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
